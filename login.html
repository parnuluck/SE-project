<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="loginstyle.css">
    </head>

    <body>
        <div class="container">
            <h1>Welcome!</h1>

            <div class="tabs">
                <span>Login</span> |
                <span class="alt-tabs" onclick="goRegister()">Register</span>
            </div>

            <input type="text" class="input-box" placeholder="Username" id="username">
            <div class="password-wrapper">
                <input type="password" class="input-box" placeholder="Password" id="password">
                <img src="eye-close.svg" id="eyeicon">
            </div>

            <div class="forgot">forget password?</div>

            <button class="btn" onclick="login()">Login</button>

            <div class="signup" onclick="goRegister()">Don't have any account?</div>
        </div>
    </body>

    <script>
        let eyeicon = document.getElementById("eyeicon");
        let password = document.getElementById("password");

        eyeicon.addEventListener("click", function() {
            if (password.type === "password") {
                password.type = "text";
                eyeicon.src = "eye-open.svg";
            } else {
                password.type = "password";
                eyeicon.src = "eye-close.svg";
            }
        });

        function goRegister() {
            window.location.href = "register.html";
        }

        function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const savedUser = localStorage.getItem("username");
            const savedPass = localStorage.getItem("password");
            if (username === savedUser && password === savedPass) {
                alert("เข้าสู่ระบบสำเร็จ!");
            } else {
                alert("Username หรือ Password ไม่ถูกต้อง");
            }

            /*setTimeout(() => {
                window.location.href = "main.html";
            }, 500);*/
        }
    </script>
</html>
