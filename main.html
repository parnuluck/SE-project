<!DOCTYPE html>
<html>
    
<head>
    <title>Canteen Table Reservation</title>
    <link rel="stylesheet" href="seat.css">
    <link rel="stylesheet" href="header.css">
</head>

<body>

    <div class="topbar">
        <div class="title">Canteen Table Reservation</div>
        <button class="login-btn" id="loginBtn">Login</button>
        <button onclick="leaveTable()">Finish / Leave Table</button>
        <script>

            function goLogin(){
                window.location.href = "login.html";
            }

            function logout(){
                localStorage.removeItem("username");
                location.reload();
            }

            window.onload = function(){

            const user = localStorage.getItem("username");
            const btn = document.getElementById("loginBtn");

            if(user){

                btn.innerHTML = user + " ▼";

                btn.onclick = function(){

                if(confirm("Logout?")){
                    logout();
                }

                };

            }

            };

</script>
    </div>

    <div id="tableArea"></div>
    <div>
        <button id="reservationBtn">Reservation</button>    
    </div>


    <div id="popup" class="popup">

        <div class="popup-box">

            <div class="popup-content">

                <div class="popup-left">

                    <h2>Reservation</h2>

                    <p>Table: <span id="tableNumber">--</span></p>
                    <p><span id="seatCount">0</span> / 6 seats used</p>
                    
                    <label>Number of people</label>
                        <input type="number" id="people" min="1" max="6" placeholder="1-6">
                </div>

                <div class="popup-right">

                    <div class="qr-box">QR CODE</div>

                </div>

            </div>

            <div class="popup-buttons">
                <button id="confirmBtn">Confirm</button>
                <button id="cancelBtn">Cancel</button>
            </div>

        </div>

    </div>
    <script src="table.js"></script>

    <script>
        if(!localStorage.getItem("username")){
        window.location.href="login.html";
        }
    </script>

    <script>function logout(){
        localStorage.removeItem("username");
        location.reload();
        }

        window.onload=function(){

            const user=localStorage.getItem("username");
            const btn=document.getElementById("loginBtn");

            if(!user){
                btn.innerText="Login";
                btn.onclick=()=>{
                    window.location.href="login.html";
                }
                return;
            }

            btn.innerText=user+" ▼";
            btn.onclick=()=>{
                if(confirm("Logout?")){
                    logout();
                }
            }
        }
    </script>
    
</body>
</html>
