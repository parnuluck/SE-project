<!DOCTYPE html>
<html>
<head>
<title>Leave Table</title>
</head>

<body>

<h2>Clearing table...</h2>

<script>

const params = new URLSearchParams(window.location.search);
const table = params.get("table");

fetch("http://localhost:3000/leave",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body: JSON.stringify({id:table})
})
.then(res=>res.json())
.then(data=>{
    document.body.innerHTML = "<h2>Thank you! Table cleared.</h2>";
});

</script>

</body>
</html>
